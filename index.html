<script>
const OMDB_KEY = "2e4cd3fb";
const posterCache = {}; // title|year -> url or "none"

async function getPoster(title, year, imgEl, phEl) {
  const key = title + "|" + year;
  if (posterCache[key] !== undefined) {
    applyPoster(posterCache[key], imgEl, phEl);
    return;
  }
  // Mark as pending so concurrent calls don't double-fetch
  posterCache[key] = "pending";
  try {
    const url = "https://www.omdbapi.com/?apikey=" + OMDB_KEY + "&t=" + encodeURIComponent(title) + "&y=" + year + "&type=movie";
    const res = await fetch(url);
    const data = await res.json();
    const poster = (data.Poster && data.Poster !== "N/A") ? data.Poster : "none";
    posterCache[key] = poster;
    applyPoster(poster, imgEl, phEl);
  } catch(e) {
    posterCache[key] = "none";
    applyPoster("none", imgEl, phEl);
  }
}

function applyPoster(url, imgEl, phEl) {
  if (!imgEl || !phEl) return;
  if (url === "none" || url === "pending") {
    phEl.style.display = "flex";
    imgEl.style.display = "none";
  } else {
    phEl.style.display = "none";
    imgEl.style.display = "block";
    imgEl.src = url;
    imgEl.onload  = () => imgEl.classList.add("vis");
    imgEl.onerror = () => { imgEl.style.display = "none"; phEl.style.display = "flex"; };
  }
}

  {t:"127 Hours",y:2010,g:"Adventure",r:7.6,s:["IMDb Top 250"]},
  {t:"1917",y:2019,g:"Action",r:8.3,s:["Prime Video","IMDb Top 250","Oscar Winners"]},
  {t:"300",y:2006,g:"Action",r:7.6,s:["Netflix"]},
  {t:"3 Idiots",y:2009,g:"Comedy",r:8.4,s:["Netflix","IMDb Top 250"]},
  {t:"400 Blows",y:1959,g:"Drama",r:8.1,s:["IMDb Top 250"]},
  {t:"50 First Dates",y:2004,g:"Comedy",r:6.8,s:["Netflix"]},
  {t:"8 1/2",y:1963,g:"Drama",r:8.0,s:["IMDb Top 250"]},
];

const SS={"Netflix":{bg:"rgba(229,9,20,.15)",c:"#ff5f63",b:"rgba(229,9,20,.4)"},"Prime Video":{bg:"rgba(0,168,224,.15)",c:"#29c4f6",b:"rgba(0,168,224,.4)"},"Apple TV+":{bg:"rgba(255,255,255,.07)",c:"#ccc",b:"rgba(255,255,255,.25)"},"Crave":{bg:"rgba(123,47,190,.15)",c:"#c080ff",b:"rgba(123,47,190,.4)"},"Disney+":{bg:"rgba(17,60,207,.15)",c:"#6b8fff",b:"rgba(17,60,207,.4)"},"Max":{bg:"rgba(0,93,160,.15)",c:"#40aaff",b:"rgba(0,93,160,.4)"},"IMDb Top 250":{bg:"rgba(245,197,24,.12)",c:"#f5c518",b:"rgba(245,197,24,.35)"},"Oscar Winners":{bg:"rgba(201,162,39,.12)",c:"#e8c96a",b:"rgba(201,162,39,.35)"}};
const ALPHA="ABCDEFGHIJKLMNOPQRSTUVWXYZ#".split("");
function sk(t){const s=t.replace(/^(The|A|An)\s+/i,"").trim();const c=s[0]?.toUpperCase()||"#";return /[A-Z]/.test(c)?c:"#";}
function dt(t){const m=t.match(/^(The|A|An)\s+(.*)/i);return m?m[2]+", "+m[1]:t;}
function rc(r){if(r>=8.5)return"#4ade80";if(r>=7.5)return"#86efac";if(r>=7.0)return"#facc15";if(r>=6.0)return"#fb923c";return"#f87171";}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

const PL={};ALPHA.forEach(l=>PL[l]=[]);
const seen=new Set();
RAW.forEach(m=>{if(seen.has(m.t))return;seen.add(m.t);const k=sk(m.t);if(PL[k])PL[k].push(m);});
ALPHA.forEach(l=>PL[l].sort((a,b)=>dt(a.t).localeCompare(dt(b.t))));

let CL="A",CG="All Genres",CS="title",CQ="",extras={},loading=false;

// Marquee
function mkMQ(id,count,sz){
  const el=document.getElementById(id);
  const cls=["br","by","bo"];
  for(let i=0;i<count;i++){
    const b=document.createElement("div");
    b.className="bulb "+cls[i%3];
    b.style.cssText="width:"+sz+"px;height:"+sz+"px;animation-delay:"+((i*.11)%1.4).toFixed(2)+"s;animation-duration:"+(.8+(i%7)*.2).toFixed(2)+"s";
    el.appendChild(b);
  }
}
mkMQ("mq1",28,10);mkMQ("mq2",28,8);mkMQ("mq3",28,8);

// Alpha buttons
const abts=document.getElementById("abts");
ALPHA.forEach(l=>{
  const b=document.createElement("button");
  b.className="ab"+(PL[l].length>0?" hm":"")+(l==="A"?" active":"");
  b.textContent=l;b.dataset.l=l;
  b.addEventListener("click",()=>selL(l));
  abts.appendChild(b);
});

function selL(l){
  CL=l;CG="All Genres";CQ="";
  document.getElementById("gsel").value="All Genres";
  const si=document.getElementById("srch");si.value="";si.placeholder='Search "'+l+'" titles...';
  document.querySelectorAll(".ab").forEach(b=>b.classList.toggle("active",b.dataset.l===l));
  setMsg("","");render();
}

document.getElementById("srch").addEventListener("input",e=>{CQ=e.target.value;render();});
document.getElementById("gsel").addEventListener("change",e=>{CG=e.target.value;render();});
document.querySelectorAll(".sb").forEach(b=>b.addEventListener("click",()=>{
  CS=b.dataset.s;
  document.querySelectorAll(".sb").forEach(x=>x.classList.toggle("active",x===b));
  render();
}));
document.getElementById("clrbtn").addEventListener("click",()=>{
  CG="All Genres";CQ="";
  document.getElementById("gsel").value="All Genres";
  document.getElementById("srch").value="";
  render();
});
document.getElementById("mbtn").addEventListener("click",searchMore);

function render(){
  const all=[...(PL[CL]||[]),...(extras[CL]||[])];
  let list=all.filter(m=>(CG==="All Genres"||m.g===CG)&&(!CQ||dt(m.t).toLowerCase().includes(CQ.toLowerCase())));
  if(CS==="year")list.sort((a,b)=>b.y-a.y);
  else if(CS==="rating")list.sort((a,b)=>b.r-a.r);
  else list.sort((a,b)=>dt(a.t).localeCompare(dt(b.t)));
  const ec=(extras[CL]||[]).length;
  document.getElementById("scnt").innerHTML=list.length+" of "+all.length+' films &nbsp;&middot;&nbsp; Letter <strong style="color:#ff8844;font-size:.8rem">'+CL+"</strong>"+(ec>0?' <span style="color:#cc6633">(+'+ec+" discovered)</span>":"");
  const grid=document.getElementById("grid"),emp=document.getElementById("emp");
  if(!list.length){grid.style.display="none";emp.style.display="block";document.getElementById("empt").textContent='No titles match your filters for "'+CL+'".';return;}
  grid.style.display="grid";emp.style.display="none";
  grid.innerHTML=list.map((m,i)=>{
    const title=dt(m.t),color=rc(m.r);
    const badges=(m.s||[]).map(src=>{const st=SS[src]||{bg:"rgba(100,60,20,.15)",c:"#aa7a50",b:"rgba(100,60,20,.3)"};return'<span class="badge" style="background:'+st.bg+';color:'+st.c+';border-color:'+st.b+'">'+esc(src)+"</span>";}).join("");
    const iid="img-"+CL+"-"+i,pid="ph-"+CL+"-"+i;
    // Check cache — show poster immediately if already fetched, else show placeholder and fetch async
    const cached=posterCache[m.t+"|"+m.y];
    const hasPoster=cached&&cached!=="none"&&cached!=="pending";
    const imgHtml=hasPoster
      ? '<img id="'+iid+'" src="'+cached+'" class="vis" alt="'+esc(title)+'"/>'
      : '<img id="'+iid+'" style="display:none"/>';
    const phStyle=hasPoster?"display:none":"display:flex";
    return '<div class="mc"><div class="cp"><div class="ph" id="'+pid+'" style="'+phStyle+'"><span class="ph-i">&#127916;</span><span class="ph-t">NO IMAGE<br>AVAILABLE</span></div>'+imgHtml+'</div><div class="ci"><div class="ct"><div class="ctitle">'+esc(title)+'</div><div class="crat" style="color:'+color+'">&#9733; '+m.r.toFixed(1)+'</div></div><div class="cm"><span class="cy">'+m.y+'</span><span class="cg">'+esc(m.g)+'</span></div><div class="cd">A '+esc(m.g.toLowerCase())+' film from '+m.y+'.</div><div class="cs">'+badges+'</div></div></div>';
  }).join("");

  // Fetch posters async for any not yet cached
  requestAnimationFrame(()=>{
    list.forEach((m,i)=>{
      const key=m.t+"|"+m.y;
      if(!posterCache[key]||posterCache[key]==="none"){
        const imgEl=document.getElementById("img-"+CL+"-"+i);
        const phEl=document.getElementById("ph-"+CL+"-"+i);
        getPoster(m.t,m.y,imgEl,phEl);
      }
    });
  });
}

function setMsg(txt,type){const el=document.getElementById("smsg");el.textContent=txt;el.className=type==="er"?"er":"ok";}

async function searchMore(){
  if(loading)return;
  loading=true;
  const btn=document.getElementById("mbtn");
  btn.disabled=true;btn.innerHTML='<span class="spin">&#9680;</span> Searching...';
  setMsg('Finding more films for "'+CL+'"...',"ok");
  const existing=[...(PL[CL]||[]),...(extras[CL]||[])].map(m=>m.t);
  const prompt='I have these movies for letter "'+CL+'": '+existing.join(", ")+'.\nFind 20-30 MORE movies starting with "'+CL+'" (after stripping The/A/An) NOT in my list. Focus on lesser-known gems, cult classics, foreign films.\nReturn ONLY a raw JSON array, no markdown.\nEach object: {"title":"Full Title","year":2001,"genre":"Drama","rating":7.5,"sources":["Netflix"],"description":"One sentence."}\ngenre: Action, Adventure, Animation, Comedy, Crime, Documentary, Drama, Fantasy, Horror, Musical, Mystery, Romance, Sci-Fi, Thriller, or Western\nsources from: Netflix, Prime Video, Apple TV+, Crave, Disney+, Max, IMDb Top 250, Oscar Winners';
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:3000,messages:[{role:"user",content:prompt}]})});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const data=await res.json();
    const raw=(data.content||[]).map(b=>b.text||"").join("").trim();
    const clean=raw.replace(/^```[\w]*\n?/,"").replace(/```$/,"").trim();
    const arr=JSON.parse(clean);
    const valid=arr.filter(m=>m.title&&sk(m.title)===CL&&!existing.includes(m.title));
    if(!valid.length){setMsg("No more selections available for this letter.","er");}
    else{extras[CL]=[...(extras[CL]||[]),...valid.map(m=>({t:m.title,y:m.year,g:m.genre,r:m.rating,s:m.sources}))];setMsg("Found "+valid.length+" more films!","ok");render();}
  }catch(e){console.error(e);setMsg("Couldn't search right now — try again.","er");}
  finally{loading=false;btn.disabled=false;btn.innerHTML="&#127916; Search for More";setTimeout(()=>setMsg("",""),3000);}
}

render();
</script>
</body>
</html>
